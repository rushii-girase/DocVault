<div class="min-h-screen bg-background flex flex-col justify-center items-center py-12 px-6 relative overflow-hidden font-body text-on-surface">
  
  <div class="absolute -top-[10%] -left-[10%] w-[50%] h-[50%] bg-primary-container/30 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-[0%] -right-[10%] w-[40%] h-[60%] bg-secondary-container/20 rounded-full blur-3xl pointer-events-none"></div>

  <div class="bg-surface-container-lowest rounded-[1.5rem] shadow-[0px_12px_32px_rgba(45,51,55,0.06)] border border-white/40 p-12 w-full max-w-md relative z-10 text-center animate-fade-in flex flex-col items-center">
    
    <!-- Loading State -->
    <div *ngIf="isLoading" class="flex flex-col items-center">
      <div class="w-16 h-16 rounded-full bg-primary-container/30 text-primary flex items-center justify-center mb-6">
        <span class="material-symbols-outlined text-3xl animate-spin">progress_activity</span>
      </div>
      <h3 class="text-2xl font-headline font-extrabold text-on-surface mb-2">Verifying your email...</h3>
      <p class="text-on-surface-variant font-label text-sm">Please wait while we confirm your student account.</p>
    </div>

    <!-- Success State -->
    <div *ngIf="isSuccessful" class="flex flex-col items-center animate-fade-in">
      <div class="w-20 h-20 rounded-full bg-green-100/50 text-green-600 flex items-center justify-center mb-6 border-4 border-white shadow-sm">
        <span class="material-symbols-outlined text-4xl">verified</span>
      </div>
      <h3 class="text-3xl font-headline font-extrabold text-on-surface mb-3">Email Verified!</h3>
      <p class="text-on-surface-variant font-bold text-green-700 bg-green-50 px-4 py-2 rounded-lg mb-8">{{ message }}</p>
      <button class="px-8 py-3 bg-gradient-to-br from-primary to-primary-dim text-white font-bold rounded-xl shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all" (click)="goToLogin()">
        Proceed to Login
      </button>
    </div>

    <!-- Failure State -->
    <div *ngIf="isFailed" class="flex flex-col items-center animate-fade-in">
      <div class="w-20 h-20 rounded-full bg-red-100/50 text-error flex items-center justify-center mb-6 border-4 border-white shadow-sm">
        <span class="material-symbols-outlined text-4xl">error</span>
      </div>
      <h3 class="text-3xl font-headline font-extrabold text-on-surface mb-3">Verification Failed</h3>
      <p class="text-on-surface-variant font-bold text-error-dim bg-error-container/20 px-4 py-2 rounded-lg mb-8">{{ message }}</p>
      <button class="px-8 py-3 bg-gradient-to-br from-surface-container-high to-surface-container text-on-surface font-bold rounded-xl border border-outline-variant/30 hover:bg-surface-dim transition-all" (click)="goToLogin()">
        Back to Login
      </button>
    </div>

  </div>
</div>
